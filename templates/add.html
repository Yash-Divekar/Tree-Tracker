<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Map App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
    <link href='https://unpkg.com/css.gg@2.0.0/icons/css/add-r.css' rel='stylesheet'>
    <style>

        #map {
            height: 550px;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
        }

    </style>
</head>

<body style="background-color: #EBE2D7; width: 100%;">
    <nav style="background-color: #c1946a; height: 100px; width: 100%; align-items: center;">
        <div class="row" >
            <div class="col-md-6">
                <h1 style="font-size: 70px; margin-left: 40px;">Tree Tracker</h1>
            </div>
            <div class="col-md-2"></div>
            <div class="col-md-4">
                {% block nav %}
                <link href='https://unpkg.com/css.gg@2.0.0/icons/css/readme.css' rel='stylesheet'>
                <div class="row" style="margin-top: 22px;">
                    <div class="col-sm-6">
                        <form action="{% url 'survey_pdf' %}">
                        <button type="submit" class='btn'
                        style="font-size: 30px;background-color: #79ad3d;border-radius: 20px;  border-width: 3px;border-color: #3e4444 ;max-height: fit-content ; max-width: max-content;"><i class="gg-readme" style="display: inline-block;color: beige;margin-right: 15px;margin-left: 5px;"></i>Survey method</button>
                    </form>
                    </div>
                    
                    <div class="col-sm-6">
                        <div style="height: 40px;">
                            <a href="#" class="d-none d-md-block btn btn-st leading-none btn-st-green"
                                style="font-size: 30px ;background-color: #79ad3d ;width: fit-content;border-radius: 20px ;  border-width: 3px;border-color: #3e4444 ;max-height: fit-content;">
                                <img src="https://sankalptaru.org/wp-content/themes/sankalptaru/dist/img/tree-icon.svg" style="height: 40px;">&nbsp;Plant now </a>
                        </div>
                    </div>
                </div>
                {% endblock %}
            </div>
        </div>
    </nav>
    <div style="flex: 1; background-color: #EBE2D7; margin-top: 15px;">
        <div class="container-fluid">
            {% block main %}
            <div class="row p-3" style="height: 100%;">
                <div class="col-md-5" style="height: 100%;">
                    <div class="card" style="box-shadow: 7px 5px 25px;border-radius: 15px;">
                        <h5 class="card-header"
                            style="width: 100%;background-color: #3e4444; color: beige; height: 60px; font-size: 37px; border-top-right-radius: 15px;border-top-left-radius: 15px;">
                            <p style="margin-left: 10px;">Survey Details</p>
                        </h5>
                        <div class='card-body' style="background-color:#79ad3d; font-size: medium; border-bottom-left-radius: 15px;border-bottom-right-radius: 15px;font-size: larger;">
                            <form method="post" action="#">
                                {% csrf_token %}
                                <div class="row p-2">
                                    <div class="col-md-6">
                                        
                                        <label for="species">Species</label>
                                        <input type="text" class="form-control" id="species" name="species" required>
                                        
                                        <label for="tree_height" style="margin: 5px;">Tree Height</label>
                                        <input type="text" name="tree_height" id="tree_height" class="form-control" required>

                                        <label for="crown_height" style="margin: 5px;">Crown Height</label>
                                        <input type="text" name="crown_height" id="crown_height" class="form-control" required>

                                        <div style="display: flex; align-items: center;">
                                            <label for="Trunk_damage" class="form-label" style="margin: 5px">Trunk damage : </label>
                                            <div id="Trunk_damage_value">0 %</div>
                                        </div> 
                                        <input type="range" class="form-range" min="0" max="100" step="1" id="Trunk_damage" name="trunk_dmg" required>

                                        <label for="reason_trunk_dmg">Reason for Trunk Damage</label>
                                        <textarea class="form-control" aria-label="With textarea" id="reason_trunk_dmg" name="reason_trunk_dmg"></textarea>
                                    </div>
                                    <div class="col-md-6">  
                                        <label for="spreading">Spreading</label>
                                        <select class="form-select" name="spreading" id="spreading" required>
                                            <option value="null">Select</option>
                                            <option value="Oval">Oval</option>
                                            <option value="Cone">Cone</option>
                                            <option value="Columnal">Columnal</option>
                                            <option value="Fan">Fan</option>
                                            <option value="Cube">Cube</option>
                                        </select>

                                        <label for="trunk_diameter" style="margin: 5px">Trunk diameter</label>
                                        <input type="text" name="trunk_diameter" id="trunk_diameter" class="form-control" required>


                                        <label for="crown_diameter" style="margin: 5px;">Crown Diameter</label>
                                        <input type="text" name="crown_diameter" id="crown_diameter" class="form-control" required>
                                        
                                        <div style="display: flex; align-items: center;">
                                            <label for="crown_damage" class="form-label" style="margin: 5px">Crown damage : </label>
                                            <div id="crown_damage_value">0 %</div>
                                        </div> 
                                        <input type="range" class="form-range" min="0" max="100" step="1" id="crown_damage" name="crown_dmg" required>
                                        
                                        <label for="reason_crown_dmg">Reason for crown Damage</label>
                                        <textarea class="form-control" aria-label="With textarea" id="reason_crown_dmg" name="'reason_crown_dmg"></textarea>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-7">
                                        <input type="hidden" name="latitude" id="latitude">
                                        <input type="hidden" name="longitude" id="longitude">
                                        <p id="lat" style="margin: 0px;">Latitude:NA </p>
                                        <p id="lng" style="padding: 0px;">Longitude:NA</p>
                                    </div>
                                    <div class="col-md-5">
                                        <button type="submit" class="btn"
                                            style="font-size:25px;background-color: #3e4444;color: beige;border-radius: 20px;margin: 5px;">Submit</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            
            <div class="col-md-7" style="height: 100%;" >
                <div id="map" style="border-radius: 15px; box-shadow: -3px 2px 15px;"></div>
            </div>
        </div>
            {% endblock %}
        </div>
    </div>
    <footer style="position: fixed; bottom: 0; width: 100%; background-color: #3e4444; height: 45px; color: beige;">
        <h5 style="display: grid; place-items: center; font-size: xx-large; ">I am planting a tree to
            teach me to gather my strength from my deepest roots</h5>
    </footer>


    {% block script %}
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    $(document).ready(function(){
      // Set initial value to 0
      $('#crown_damage').val(0);
      
      // Display the value and update in real-time while dragging
      $('#crown_damage').on('input', function(){
        $('#crown_damage_value').text($(this).val() + " %");
      });
    });

    $(document).ready(function(){
      // Set initial value to 0
      $('#Trunk_damage').val(0);
      
      // Display the value and update in real-time while dragging
      $('#Trunk_damage').on('input', function(){
        $('#Trunk_damage_value').text($(this).val() + " %");
      });
    });
  </script>

    <script>
        var map = L.map('map').setView([20.5937, 78.9629], 5); 
        var marker = null;
        const lat = document.getElementById('lat')
        const lng = document.getElementById('lng')
        const crown_dmg = document.getElementById('crown_dmg')
        const crown_type = document.getElementById('crown_type')
        

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        }).addTo(map);

        map.on('click', function (e) {
            document.getElementById('latitude').value = e.latlng.lat.toFixed(6);
            document.getElementById('longitude').value = e.latlng.lng.toFixed(6);
            lat.innerText = `Latitude: ${e.latlng.lat.toFixed(6)}`
            lng.innerText = `Longitude: ${e.latlng.lng.toFixed(6)}`
           
            if (marker !== null) {
                map.removeLayer(marker);
            }

            marker = L.marker(e.latlng, { draggable: false }).addTo(map);
        });
        async function data(){
            const responce= await fetch('/species/');
            const result =await responce.json()
            console.log(result)
            return result
        }
    </script>
    
    {% endblock %}
</body>

</html>
