{% block script %}
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.css" />

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script type="text/javascript">

  var map = L.map('map').setView([20.5937, 78.9629], 5); // Center coordinates of India, zoom level 5
  // Add OpenStreetMap tiles

  var markersLayer = L.layerGroup();

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors',
      maxZoom: 18
  }).addTo(map);

  var heatmapLayer;
  togglePoints();

  function toggleHeatmap() {
      
      console.log("Toggling heatmap");

      
    map.removeLayer(markersLayer);

    
    if (heatmapLayer) {
      map.removeLayer(heatmapLayer);
    }

    
    var heatmapData = {{ heatmap_data|safe }};
    var heat = L.heatLayer([], { 
        radius: 40, 
        maxOpacity: 1.0,
        gradient: { 0.0: 'brown', 0.1: 'orange', 0.3: 'darkgreen' },
        opacity: 1, 
    }).addTo(map);

    
    var heatmapPoints = [];
    heatmapData.forEach(function (point) {
        var intensity = Math.min(1, point.intensity / 10); 
        var color = 'rgba(0,0,0,' + intensity + ')';
        heatmapPoints.push([point.latitude, point.longitude, intensity]);
    });
    heat.setLatLngs(heatmapPoints);
  }

  function togglePoints() {
      
      console.log("Toggling points");

      if (heatmapLayer) {
        map.removeLayer(heatmapLayer);
        heatmapLayer = null;
    }
      
      markersLayer.clearLayers();

      
      var data = {{data | safe}}
      for (var i = 0; i < data.length; i++) {
        var circleMarker = L.circleMarker([data[i].latitude, data[i].longitude], {
          radius: 3,
          color: 'green',
          opacity: 0.3,
          fillColor: 'green',
        }).addTo(markersLayer);

        var popupContent = `
            <div>
                <p>${data[i].species}</p>
            </div>
        `;
        circleMarker.bindPopup(popupContent);
      }

      markersLayer.addTo(map);
  }

</script>

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load("current", {packages:["corechart"]});
      google.charts.setOnLoadCallback(drawChart);
    
      function drawChart() {
        var spreadingCounts = {};
        var SurveyData = {{ data|safe }};
            
            SurveyData.forEach(function (survey) {
                var spreading = survey.spreading;
                if (spreading in spreadingCounts) {
                    spreadingCounts[spreading]++;
                } else {
                    spreadingCounts[spreading] = 1;
                }
            });
            
            var spreadingData = [];
            for (var key in spreadingCounts) {
                if (spreadingCounts.hasOwnProperty(key)) {
                    spreadingData.push([key, spreadingCounts[key]]);
                }
            }
            
            spreadingData.sort();

         var data = new google.visualization.DataTable();
            data.addColumn('string', 'Spreading');
            data.addColumn('number', 'Count');
            data.addRows(spreadingData);

        var options = {
          title: 'Spreading',
          is3D: true,
          backgroundColor:'#79ad3d',
          chartArea: {width: '100%', height: '80%'},
        };

        var chart = new google.visualization.PieChart(document.getElementById('piechart_3d'));
        chart.draw(data, options);
      }
    </script>

{% endblock %}
